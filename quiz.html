<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quiz – Gabriella &amp; Daniel</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body data-lang="sv" class="rsvp-page">
    <div class="language-overlay" id="languageOverlay" aria-modal="true" role="dialog">
      <div class="language-overlay__panel">
        <p class="language-overlay__eyebrow">Välj språk / Odaberite jezik</p>
        <h2 class="language-overlay__title">Gabriella &amp; Daniel</h2>
        <div class="language-overlay__buttons">
          <button class="btn btn--ghost" data-lang-choice="sv">Svenska</button>
          <button class="btn btn--ghost" data-lang-choice="hr">Hrvatski</button>
        </div>
      </div>
    </div>

    <header class="site-header">
      <nav class="nav">
        <a href="index.html#top" class="nav__logo">G &amp; D</a>
        <a class="nav__cta btn btn--primary" href="index.html#top">
          <span class="lang-sv">Tillbaka</span>
          <span class="lang-hr">Natrag</span>
        </a>
      </nav>
    </header>

    <main>
      <section class="section rsvp-form-section">
        <div class="section__header">
          <p class="section__eyebrow">
            <span class="lang-sv">Quiz</span>
            <span class="lang-hr">Kviz</span>
          </p>
          <h2>
            <span class="lang-sv">Quiz om brudparet</span>
            <span class="lang-hr">Kviz o mladencima</span>
          </h2>
          <p class="section__muted">
            <span class="lang-sv">
              Du kan lägga in frågorna senare. Fyll bara i dina svar när formuläret är klart.
            </span>
            <span class="lang-hr">
              Pitanja možete dodati kasnije. Unesite vaše odgovore kada obrazac bude gotov.
            </span>
          </p>
        </div>

        <form
          class="rsvp-form"
          action="https://formkeep.com/f/9791e76f76c7"
          method="POST"
          accept-charset="UTF-8"
        >
          <!-- FormKeep anti-spam: should remain empty -->
          <input
            type="text"
            name="_gotcha"
            style="display: none"
            tabindex="-1"
            autocomplete="off"
          />
          <input type="hidden" name="_redirect_url" value="tack.html?source=quiz" />
          <input type="hidden" name="_next" value="tack.html?source=quiz" />
          <input type="hidden" name="form_type" value="quiz" />

          <label for="quizName">
            <span class="lang-sv">Namn</span>
            <span class="lang-hr">Ime</span>
          </label>
          <input id="quizName" name="name" type="text" required />

          <label for="quizEmail">
            <span class="lang-sv">E-post</span>
            <span class="lang-hr">E-mail</span>
          </label>
          <input id="quizEmail" name="email" type="email" required />

          <label for="q1">
            <span class="lang-sv">Fråga 1 (placeholder)</span>
            <span class="lang-hr">Pitanje 1 (placeholder)</span>
          </label>
          <select id="q1" name="q1" required>
            <option value="">Välj / Odaberite</option>
            <option value="A">Alternativ A</option>
            <option value="B">Alternativ B</option>
            <option value="C">Alternativ C</option>
            <option value="D">Alternativ D</option>
          </select>

          <label for="q2">
            <span class="lang-sv">Fråga 2 (placeholder)</span>
            <span class="lang-hr">Pitanje 2 (placeholder)</span>
          </label>
          <select id="q2" name="q2" required>
            <option value="">Välj / Odaberite</option>
            <option value="A">Alternativ A</option>
            <option value="B">Alternativ B</option>
            <option value="C">Alternativ C</option>
            <option value="D">Alternativ D</option>
          </select>

          <label for="q3">
            <span class="lang-sv">Fråga 3 (placeholder)</span>
            <span class="lang-hr">Pitanje 3 (placeholder)</span>
          </label>
          <select id="q3" name="q3" required>
            <option value="">Välj / Odaberite</option>
            <option value="A">Alternativ A</option>
            <option value="B">Alternativ B</option>
            <option value="C">Alternativ C</option>
            <option value="D">Alternativ D</option>
          </select>

          <label for="q4">
            <span class="lang-sv">Fråga 4 (placeholder)</span>
            <span class="lang-hr">Pitanje 4 (placeholder)</span>
          </label>
          <select id="q4" name="q4" required>
            <option value="">Välj / Odaberite</option>
            <option value="A">Alternativ A</option>
            <option value="B">Alternativ B</option>
            <option value="C">Alternativ C</option>
            <option value="D">Alternativ D</option>
          </select>

          <label for="q5">
            <span class="lang-sv">Fråga 5 (placeholder)</span>
            <span class="lang-hr">Pitanje 5 (placeholder)</span>
          </label>
          <select id="q5" name="q5" required>
            <option value="">Välj / Odaberite</option>
            <option value="A">Alternativ A</option>
            <option value="B">Alternativ B</option>
            <option value="C">Alternativ C</option>
            <option value="D">Alternativ D</option>
          </select>

          <label for="quizExtra">
            <span class="lang-sv">Utslagsfråga / extra kommentar (valfritt)</span>
            <span class="lang-hr">Dodatno pitanje / komentar (nije obavezno)</span>
          </label>
          <textarea
            id="quizExtra"
            name="quiz_extra"
            rows="4"
            placeholder="Skriv ditt svar här..."
          ></textarea>

          <button class="btn btn--primary" type="submit">
            <span class="lang-sv">Skicka quiz</span>
            <span class="lang-hr">Pošalji kviz</span>
          </button>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
